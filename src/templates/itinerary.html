<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>

body {
  font-family: Arial, sans-serif;
  background: #f3f6fb;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 850px;
  margin: auto;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
}

/* HEADER */
.header {
  background: #0a2540;
  color: white;
  padding: 25px 30px;
}

.header img {
  height: 40px;
}

.header h1 {
  margin: 10px 0 5px;
  font-size: 22px;
}

.header p {
  margin: 0;
  font-size: 14px;
  color: #cbd5e1;
}

.day-card {
  padding: 24px 28px;
  border-bottom: 1px solid #e5e7eb;
}

.day-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.day-title {
  font-size: 18px;
  font-weight: 600;
  color: #111827;
}

.day-badge {
  background: #2563eb;
  color: white;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 6px;
}

.location {
  font-size: 13px;
  color: #6b7280;
  margin-top: 4px;
}

.description {
  margin-top: 12px;
  font-size: 14px;
  color: #374151;
  line-height: 1.6;
}

.section {
  margin-top: 14px;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #111827;
}

.tag {
  display: inline-block;
  background: #f1f5f9;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  margin: 4px 6px 0 0;
}

/* DAY BLOCK */
.day {
  padding: 25px 30px;
  border-bottom: 1px solid #eee;
}

.day-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.day-title {
  font-size: 18px;
  font-weight: bold;
}

.day-number {
  background: #2563eb;
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
}

/* LOCATION */
.location {
  margin-top: 5px;
  font-size: 13px;
  color: #6b7280;
}

/* DESCRIPTION */
.desc {
  margin-top: 12px;
  font-size: 14px;
  line-height: 1.6;
}

/* SECTION */
.section {
  margin-top: 12px;
}

.section-title {
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 5px;
}

/* TAG */
.tag {
  display: inline-block;
  background: #f1f5f9;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  margin: 4px 4px 0 0;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #6b7280;
}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
  <table width="100%">
    <tr>
      <td>
        <img src="{{logo}}" height="40"/>
      </td>
      <td align="right">
        <h1 style="margin:0;">Trip Itinerary</h1>
        <p style="margin:0;">{{startDate}} - {{endDate}}</p>
      </td>
    </tr>
  </table>
</div>

  <!-- DAYS -->
  {{itinerary}}

  <!-- FOOTER -->
  <div class="footer">
    Have a safe and happy journey ✈️<br/>
    © Sarvatrah Pvt Ltd
  </div>

</div>

</body>
</html>
